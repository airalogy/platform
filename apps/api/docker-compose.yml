services:
  api-server:
    image: airalogy-platform-backend
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && python3 -m uvicorn app.main:app --host 0.0.0.0 --port 4000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:4000:4000"
    expose:
      - "4000"
    volumes:
      - .:/home/deploy/app
    env_file: ${AIRALOGY_ENV_FILE:-.env}
  db:
    image: airalogy-platform-postgresql
    build:
      context: .
      dockerfile: postgresql.Dockerfile
      args:
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-http://deb.debian.org/debian}
        APT_DEBIAN_SECURITY_MIRROR: ${APT_DEBIAN_SECURITY_MIRROR:-http://deb.debian.org/debian-security}
        APT_POSTGRES_MIRROR: ${APT_POSTGRES_MIRROR:-http://apt.postgresql.org/pub/repos/apt}
    volumes:
      - ${POSTGRES_DATA_PATH}:/var/lib/postgresql/data/
    expose:
      - "5432"
    ports:
      - "127.0.0.1:54322:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 10
  minio:
    image: quay.io/minio/minio:RELEASE.2024-03-26T22-10-45Z
    command: server /data --address ":9200" --console-address ":9201"
    expose:
      - "9200"
      - "9201"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9201:9201"
    volumes:
      - ${MINIO_DATA_PATH}:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "mc alias set local http://localhost:9200 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} >/dev/null && mc ready local" ]
      interval: 30s
      timeout: 10s
      retries: 5
  createbuckets:
    image: quay.io/minio/mc:RELEASE.2024-03-25T16-41-14Z
    depends_on:
      minio:
        condition: service_healthy
    env_file: ${AIRALOGY_ENV_FILE:-.env}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9200 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb -p local/$${MINIO_BUCKET} || true;
      "
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
