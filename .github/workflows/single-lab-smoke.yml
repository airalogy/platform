name: Single-Lab Deployment Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/**"
      - "deploy/single-lab/**"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "uno.config.ts"
      - "patches/**"
      - ".github/workflows/single-lab-smoke.yml"

concurrency:
  group: single-lab-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deployment-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate production configuration
        working-directory: deploy/single-lab
        run: ./scripts/generate-env.sh --site-url http://localhost:18080

      - name: Validate scripts and Compose
        working-directory: deploy/single-lab
        run: |
          bash -n scripts/*.sh
          ./scripts/preflight.sh --config-only

      - name: Build and start from empty volumes
        working-directory: deploy/single-lab
        run: ./scripts/start.sh

      - name: Run account and permission acceptance flow
        working-directory: deploy/single-lab
        run: ./scripts/acceptance-test.sh

      - name: Verify backup and restore
        working-directory: deploy/single-lab
        run: |
          backup_path="$(./scripts/backup.sh ci-restore)"
          ./scripts/restore.sh "$backup_path" --yes

      - name: Verify upgrade and rollback
        working-directory: deploy/single-lab
        run: |
          ./scripts/upgrade.sh --no-pull
          ./scripts/rollback.sh --yes

      - name: Show service logs on failure
        if: failure()
        working-directory: deploy/single-lab
        run: docker compose --env-file .env -f compose.yml logs --no-color --tail=300

      - name: Clean up
        if: always()
        working-directory: deploy/single-lab
        run: docker compose --env-file .env -f compose.yml down --volumes --remove-orphans
